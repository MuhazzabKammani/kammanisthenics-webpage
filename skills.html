<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Choose your Skill</title>
    <link rel="stylesheet" href="skills.css" />
  </head>
  <body>
    <header><h1>Skills</h1></header>
    <main>
      <section>
        <h2>Foundational Skills (Beginner)</h2>
        <p>
          These exercises build the necessary strength and body awareness for
          harder skills
        </p>

        <div class="image-grid">
          <article class="img">
            <img src="images/push-ups.jpg" alt="push-ups" />
            <h3>Push-ups</h3>
          </article>
          <article class="img">
            <img src="images/pull-ups.jpg" alt="pull-ups" />
            <h3>Pull-ups</h3>
          </article>
          <article class="img">
            <img src="images/dips.jpg" alt="dips" />
            <h3>Dips</h3>
          </article>
          <article class="img">
            <img src="images/squats.webp" alt="squats" />
            <h3>Squats</h3>
          </article>
          <article class="img">
            <img
              src="images/tucked-hollow-body-hold.jpg"
              alt="tucked hollow body hold" />
            <h3>Tucked Hollow Hold</h3>
          </article>
          <article class="img">
            <img src="images/dead-hangs.avif" alt="dead hangs" />
            <h3>Dead hangs</h3>
          </article>
        </div>
      </section>
    </main>
  </body>
</html>
